<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #333; }
  .card {
    width: 1080px; height: 1080px; position: relative; overflow: hidden;
    background: linear-gradient(163deg, #1E3329 0%, #16281F 100%);
    font-family: 'Pretendard Variable', sans-serif; color: #F7F4EC;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 96px 92px;
  }
  .glow { position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(46% 40% at 86% 8%, rgba(109,190,138,0.34) 0%, transparent 60%); }
  .grain { position: absolute; inset: 0; pointer-events: none; opacity: 0.05; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }
  .frame { position: absolute; inset: 40px; border: 1px solid rgba(247,244,236,0.14); border-radius: 26px; pointer-events: none; }
  .quote-mark { font-family: 'Noto Serif KR', serif; font-weight: 900; font-size: 200px; line-height: 0.7; color: #6DBE8A; height: 110px; }
  .quote { font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 74px; line-height: 1.55; margin-top: 30px; }
  .source { margin-top: 54px; font-size: 30px; font-weight: 500; color: rgba(247,244,236,0.6); letter-spacing: 0.01em; }
  .sign { position: absolute; bottom: 78px; left: 0; right: 0; text-align: center; font-size: 30px; font-weight: 700; color: #6DBE8A; }
</style>
</head>
<body>

<div class="card" id="c1">
  <div class="glow"></div><div class="grain"></div><div class="frame"></div>
  <div class="quote-mark">“</div>
  <div class="quote">간소하게,<br/>간소하게 살라.</div>
  <div class="source">헨리 데이비드 소로 『월든』</div>
  <div class="sign">🌱 북블룸</div>
</div>

<div class="card" id="c2">
  <div class="glow"></div><div class="grain"></div><div class="frame"></div>
  <div class="quote-mark">“</div>
  <div class="quote">여자에게는<br/>자기만의 방이 필요하다.</div>
  <div class="source">버지니아 울프 『자기만의 방』</div>
  <div class="sign">🌱 북블룸</div>
</div>

<div class="card" id="c3">
  <div class="glow"></div><div class="grain"></div><div class="frame"></div>
  <div class="quote-mark">“</div>
  <div class="quote">나를 죽이지 못한 것은<br/>나를 더 강하게 한다.</div>
  <div class="source">프리드리히 니체</div>
  <div class="sign">🌱 북블룸</div>
</div>

<div class="card" id="c4">
  <div class="glow"></div><div class="grain"></div><div class="frame"></div>
  <div class="quote-mark">“</div>
  <div class="quote">아름다움이<br/>세상을 구원한다.</div>
  <div class="source">도스토옙스키 『카라마조프가의 형제들』</div>
  <div class="sign">🌱 북블룸</div>
</div>

</body>
</html>
